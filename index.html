<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worker App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(48%) sepia(13%) saturate(3207%) hue-rotate(190deg) brightness(95%) contrast(80%);
        }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans text-slate-900">
    <div class="max-w-md mx-auto bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-100">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-black tracking-tight uppercase">Worker Comfortable</h1>
            <p class="text-blue-100 text-xs mt-1 font-bold">Калькулятор рабочего времени</p>
        </div>

        <div class="p-6">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Ставка €/ч</label>
                    <input type="number" id="r_n" value="10" class="w-full bg-slate-100 border-none rounded-2xl p-4 text-xl font-bold focus:ring-2 focus:ring-blue-500 transition-all" oninput="calc()">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Сверх €/ч</label>
                    <input type="number" id="r_o" value="15" class="w-full bg-slate-100 border-none rounded-2xl p-4 text-xl font-bold focus:ring-2 focus:ring-blue-500 transition-all" oninput="calc()">
                </div>
            </div>

            <div id="list" class="space-y-4 mb-8">
                </div>

            <button onclick="add()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg active:scale-[0.97] transition-all shadow-lg shadow-blue-200 mb-8 flex items-center justify-center gap-2">
                <span class="text-2xl">+</span> ДОБАВИТЬ ДЕНЬ
            </button>

            <div class="bg-slate-900 rounded-[1.5rem] p-6 text-white shadow-xl shadow-slate-200">
                <div class="flex justify-between items-center opacity-60 mb-2 text-sm font-bold uppercase tracking-widest">
                    <span>Всего часов</span>
                    <span id="h">0.00</span>
                </div>
                <div class="flex justify-between items-end">
                    <span class="text-lg font-black uppercase tracking-tight">К оплате</span>
                    <span id="m" class="text-4xl font-black text-yellow-400">0.00 €</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let count = 0;
        
        function add() {
            count++;
            const list = document.getElementById('list');
            const card = document.createElement('div');
            card.className = "bg-white p-5 rounded-[1.5rem] border-2 border-slate-50 shadow-sm space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-300";
            
            card.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="bg-slate-900 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase">День ${count}</span>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-bold text-slate-400 uppercase italic">Обед (мин)</span>
                        <input type="number" value="0" class="w-16 bg-slate-50 border rounded-lg p-1 text-center font-bold text-sm" oninput="calc()">
                    </div>
                </div>
                <div class="flex gap-4 items-center">
                    <div class="flex-1 space-y-1 text-center">
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Начало</span>
                        <input type="time" value="07:00" class="w-full bg-slate-50 border-none rounded-xl p-3 font-black text-center text-blue-600" oninput="calc()">
                    </div>
                    <div class="text-slate-300 font-black mt-4">→</div>
                    <div class="flex-1 space-y-1 text-center">
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Конец</span>
                        <input type="time" value="16:00" class="w-full bg-slate-50 border-none rounded-xl p-3 font-black text-center text-blue-600" oninput="calc()">
                    </div>
                </div>
            `;
            list.appendChild(card);
            calc();
        }

        function calc() {
            let totalH = 0;
            let totalM = 0;
            const rn = parseFloat(document.getElementById('r_n').value) || 0;
            const ro = parseFloat(document.getElementById('r_o').value) || 0;
            
            const cards = document.querySelectorAll('#list > div');
            cards.forEach(card => {
                const inputs = card.querySelectorAll('input');
                const breakMin = parseFloat(inputs[0].value) || 0;
                const start = inputs[1].value;
                const end = inputs[2].value;

                if (start && end) {
                    const sTime = new Date('2000-01-01T' + start);
                    const eTime = new Date('2000-01-01T' + end);
                    let diff = (eTime - sTime) / (1000 * 60 * 60);
                    
                    if (diff < 0) diff += 24; // Если смена переходит через полночь
                    
                    let net = Math.max(0, diff - (breakMin / 60));
                    totalH += net;

                    if (net > 8) {
                        totalM += (8 * rn) + ((net - 8) * ro);
                    } else {
                        totalM += net * rn;
                    }
                }
            });

            document.getElementById('h').innerText = totalH.toFixed(2);
            document.getElementById('m').innerText = totalM.toFixed(2) + ' €';
        }

        // Добавляем первый день автоматически при загрузке
        add();
    </script>
</body>
</html>
