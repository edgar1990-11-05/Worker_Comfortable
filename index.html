<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worker Comfortable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f2f2f7; -webkit-tap-highlight-color: transparent; }
        .ios-table { width: 100%; border-collapse: separate; border-spacing: 0; background: white; border-radius: 14px; overflow: hidden; }
        th { background: #f8fafc; font-size: 11px; text-transform: uppercase; color: #64748b; padding: 12px 8px; border-bottom: 1px solid #e5e7eb; }
        td { padding: 10px 4px; border-bottom: 1px solid #f2f2f7; text-align: center; }
        input[type="time"] { 
            background: #f1f5f9; border-radius: 8px; padding: 6px 4px; 
            font-weight: 700; color: #1e293b; border: none; font-size: 15px;
            -webkit-appearance: none; min-width: 75px;
        }
        tr.weekend { background-color: #fff5f5; }
        tr.weekend td:first-child { color: #ef4444; }
        .sticky-footer { position: sticky; bottom: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #e5e7eb; padding: 20px; }
    </style>
</head>
<body class="font-sans antialiased text-slate-900">

    <div class="max-w-xl mx-auto min-h-screen flex flex-col">
        
        <header class="p-6 pb-2">
            <h1 class="text-3xl font-black tracking-tight text-slate-800" id="month-title">АПРЕЛЬ</h1>
            <div class="flex gap-4 mt-4 bg-white p-4 rounded-2xl shadow-sm border">
                <div class="flex-1"><label class="text-[10px] font-bold text-slate-400 block uppercase">Норма €</label><input type="number" id="r_n" value="10" class="w-full text-xl font-bold text-blue-600 outline-none" oninput="calc()"></div>
                <div class="flex-1 border-l pl-4"><label class="text-[10px] font-bold text-slate-400 block uppercase">Сверх €</label><input type="number" id="r_o" value="15" class="w-full text-xl font-bold text-orange-600 outline-none" oninput="calc()"></div>
            </div>
        </header>

        <div class="p-4 flex-1">
            <table class="ios-table shadow-sm">
                <thead>
                    <tr>
                        <th class="w-16">День</th>
                        <th>Начало</th>
                        <th>Конец</th>
                        <th class="w-14">Обед</th>
                        <th>€</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="sticky-footer">
            <div class="flex justify-between items-end mb-2 text-slate-500 font-bold text-xs uppercase tracking-widest">
                <span>Всего: <span id="total_h" class="text-slate-800">0</span> ч.</span>
                <span>Выплата</span>
            </div>
            <div id="total_m" class="text-5xl font-black text-blue-600 tracking-tighter text-right leading-none">0.00 €</div>
            <button onclick="if(confirm('Сбросить данные?')) { localStorage.clear(); location.reload(); }" class="mt-4 w-full text-[10px] font-bold text-slate-300 uppercase tracking-[0.2em]">Сбросить месяц</button>
        </div>
    </div>

    <script>
        const weekdays = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
        const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

        window.onload = function() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            document.getElementById('month-title').innerText = months[month].toUpperCase();

            const saved = JSON.parse(localStorage.getItem('worker_log') || '{}');
            document.getElementById('r_n').value = saved.r_n || 10;
            document.getElementById('r_o').value = saved.r_o || 15;

            const tbody = document.getElementById('table-body');

            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month, d);
                const dayName = weekdays[date.getDay()];
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const rowData = saved.rows ? saved.rows[d-1] : null;

                const tr = document.createElement('tr');
                if (isWeekend) tr.className = 'weekend';
                
                tr.innerHTML = `
                    <td class="font-bold text-sm">${d} <span class="text-[10px] opacity-50">${dayName}</span></td>
                    <td><input type="time" step="900" value="${rowData ? rowData.s : ''}" oninput="calc()"></td>
                    <td><input type="time" step="900" value="${rowData ? rowData.e : ''}" oninput="calc()"></td>
                    <td><input type="number" value="${rowData ? rowData.l : 0}" class="w-10 text-center font-bold bg-slate-50 rounded" oninput="calc()"></td>
                    <td id="row-m" class="font-black text-slate-400 text-xs tracking-tighter">0</td>
                `;
                tbody.appendChild(tr);
            }
            calc();
        };

        function calc() {
            let tH = 0, tM = 0;
            const rn = parseFloat(document.getElementById('r_n').value) || 0;
            const ro = parseFloat(document.getElementById('r_o').value) || 0;
            const rows = [];

            document.querySelectorAll('#table-body tr').forEach(tr => {
                const i = tr.querySelectorAll('input');
                const s = i[0].value, e = i[1].value, l = parseFloat(i[2].value) || 0;
                rows.push({s, e, l});

                if (s && e) {
                    let diff = (new Date('T'+e) - new Date('T'+s))/3600000;
                    if (diff < 0) diff += 24;
                    let net = Math.max(0, diff - l/60);
                    let m = net > 8 ? (8*rn + (net-8)*ro) : (net*rn);
                    tr.querySelector('#row-m').innerText = Math.round(m);
                    tr.querySelector('#row-m').className = "font-black text-blue-600 text-sm";
                    tH += net; tM += m;
                } else {
                    tr.querySelector('#row-m').innerText = "0";
                    tr.querySelector('#row-m').className = "font-black text-slate-300 text-xs";
                }
            });

            document.getElementById('total_h').innerText = tH.toFixed(1);
            document.getElementById('total_m').innerText = tM.toFixed(2) + ' €';
            localStorage.setItem('worker_log', JSON.stringify({r_n: rn, r_o: ro, rows}));
        }
    </script>
</body>
</html>
