<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Month View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        table { border-spacing: 0; width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; }
        th { background: #1e293b; color: white; font-size: 10px; text-transform: uppercase; sticky; top: 0; }
        tr.weekend { background-color: #f8fafc; color: #94a3b8; }
        input { width: 100%; border: none; outline: none; background: transparent; font-weight: 600; text-align: center; font-size: 14px; }
        .table-container { overflow-x: auto; max-height: 70vh; border-radius: 12px; border: 1px solid #e2e8f0; }
        .total-card { background: #2563eb; color: white; padding: 20px; border-radius: 20px; shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body class="bg-slate-50 p-2 md:p-6">
    <div class="max-w-4xl mx-auto">
        
        <header class="flex justify-between items-center mb-6 px-2">
            <h1 class="text-2xl font-black text-slate-900 tracking-tight" id="month-name">МЕСЯЦ</h1>
            <div class="flex gap-2 bg-white p-3 rounded-xl border shadow-sm">
                <input type="number" id="rate_n" value="10" class="!w-12 text-blue-600 border-r" oninput="saveAndCalc()">
                <input type="number" id="rate_o" value="15" class="!w-12 text-orange-600" oninput="saveAndCalc()">
            </div>
        </header>

        <div class="table-container bg-white shadow-sm">
            <table>
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Начало</th>
                        <th>Конец</th>
                        <th>Обед</th>
                        <th>Часы</th>
                        <th>Сумма</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="mt-6 space-y-4 px-2">
            <div class="total-card flex justify-between items-center">
                <span class="text-xs font-bold uppercase opacity-80">Итого к выплате:</span>
                <span id="total_m" class="text-3xl font-black text-yellow-300">0.00 €</span>
            </div>
            <div class="bg-slate-800 text-white p-4 rounded-2xl flex justify-between items-center">
                <span class="text-xs font-bold uppercase opacity-60">Всего часов:</span>
                <span id="total_h" class="text-xl font-bold">0.00</span>
            </div>
        </div>

        <button onclick="if(confirm('Очистить всё?')) { localStorage.clear(); location.reload(); }" class="w-full mt-8 text-slate-400 text-xs font-bold uppercase tracking-widest py-4">
            Сбросить все данные
        </button>
    </div>

    <script>
        const tableBody = document.getElementById('table-body');
        const monthNameHeader = document.getElementById('month-name');

        window.onload = function() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            monthNameHeader.innerText = now.toLocaleString('ru', { month: 'long' }).toUpperCase();

            const saved = JSON.parse(localStorage.getItem('worker_month_data') || '{}');
            document.getElementById('rate_n').value = saved.rate_n || 10;
            document.getElementById('rate_o').value = saved.rate_o || 15;

            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const dateStr = `${day}.${month + 1}`;
                
                const rowData = saved.rows ? saved.rows[day-1] : null;

                const tr = document.createElement('tr');
                if (isWeekend) tr.className = 'weekend';
                
                tr.innerHTML = `
                    <td class="text-xs font-bold">${dateStr}</td>
                    <td><input type="time" value="${rowData ? rowData.start : ''}" oninput="saveAndCalc()"></td>
                    <td><input type="time" value="${rowData ? rowData.end : ''}" oninput="saveAndCalc()"></td>
                    <td><input type="number" value="${rowData ? rowData.lunch : 0}" class="!w-8" oninput="saveAndCalc()"></td>
                    <td id="row-h" class="font-bold text-slate-400 text-xs italic">0</td>
                    <td id="row-m" class="font-bold text-blue-600 bg-blue-50/50">0</td>
                `;
                tableBody.appendChild(tr);
            }
            saveAndCalc();
        };

        function saveAndCalc() {
            let totalH = 0, totalM = 0;
            const rn = parseFloat(document.getElementById('rate_n').value) || 0;
            const ro = parseFloat(document.getElementById('rate_o').value) || 0;
            const rowsArray = [];

            document.querySelectorAll('#table-body tr').forEach((tr, index) => {
                const inputs = tr.querySelectorAll('input');
                const start = inputs[0].value;
                const end = inputs[1].value;
                const lunch = parseFloat(inputs[2].value) || 0;

                rowsArray.push({ start, end, lunch });

                if (start && end) {
                    let diff = (new Date('2000-01-01T'+end) - new Date('2000-01-01T'+start))/3600000;
                    if (diff < 0) diff += 24;
                    let net = Math.max(0, diff - lunch/60);
                    let money = net > 8 ? (8 * rn + (net - 8) * ro) : (net * rn);
                    
                    tr.querySelector('#row-h').innerText = net.toFixed(1);
                    tr.querySelector('#row-m').innerText = Math.round(money);
                    totalH += net;
                    totalM += money;
                } else {
                    tr.querySelector('#row-h').innerText = '0';
                    tr.querySelector('#row-m').innerText = '0';
                }
            });

            document.getElementById('total_h').innerText = totalH.toFixed(2);
            document.getElementById('total_m').innerText = totalM.toFixed(2).replace('.', ',') + ' €';

            localStorage.setItem('worker_month_data', JSON.stringify({
                rate_n: rn,
                rate_o: ro,
                rows: rowsArray
            }));
        }
    </script>
</body>
</html>
