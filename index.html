<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worker Comfortable LT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f2f2f7; -webkit-user-select: none; }
        .ios-table { width: 100%; border-collapse: separate; border-spacing: 0; background: white; border-radius: 14px; overflow: hidden; }
        th { background: #f8fafc; font-size: 10px; text-transform: uppercase; color: #64748b; padding: 12px 4px; border-bottom: 1px solid #e5e7eb; }
        td { padding: 8px 2px; border-bottom: 1px solid #f2f2f7; text-align: center; }
        
        .time-select { 
            background: #f1f5f9; border-radius: 8px; padding: 8px 2px; 
            font-weight: 800; color: #1e293b; border: none; font-size: 14px;
            -webkit-appearance: none; width: 80px; text-align: center;
            text-align-last: center; cursor: pointer;
        }

        input[type="number"] { background: #f8fafc; border-radius: 6px; border: 1px solid #e2e8f0; font-weight: 700; }
        
        tr.holiday { background-color: #fff5f5; }
        tr.holiday td:first-child { color: #ef4444; }

        .sticky-footer { position: sticky; bottom: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-top: 1px solid #e5e7eb; padding: 15px 20px 30px; }
        
        /* Исправленный блок выбора месяца */
        .picker-container { position: relative; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        #month-picker { 
            position: absolute; 
            left: 0; top: 0; width: 100%; height: 100%; 
            opacity: 0; cursor: pointer; 
        }
    </style>
</head>
<body class="font-sans antialiased text-slate-900">

    <div class="max-w-xl mx-auto min-h-screen flex flex-col">
        <header class="p-6 pb-2">
            <div class="picker-container">
                <h1 class="text-3xl font-black tracking-tight text-slate-800" id="month-title">ГРАФИК</h1>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <input type="month" id="month-picker" onchange="changeDate(this.value)">
            </div>
            
            <div class="flex gap-4 mt-4 bg-white p-4 rounded-2xl shadow-sm border">
                <div class="flex-1"><label class="text-[10px] font-bold text-slate-400 block uppercase">Норма €</label><input type="number" id="r_n" value="10" class="w-full text-xl font-bold text-blue-600 outline-none" oninput="calc()"></div>
                <div class="flex-1 border-l pl-4"><label class="text-[10px] font-bold text-slate-400 block uppercase">Сверх €</label><input type="number" id="r_o" value="15" class="w-full text-xl font-bold text-orange-600 outline-none" oninput="calc()"></div>
            </div>
        </header>

        <div class="p-2 flex-1">
            <table class="ios-table shadow-sm">
                <thead>
                    <tr>
                        <th class="w-12">День</th>
                        <th>Начало</th>
                        <th>Конец</th>
                        <th class="w-12">Обед</th>
                        <th>€</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="sticky-footer">
            <div class="flex justify-between items-end mb-1 text-slate-500 font-bold text-[10px] uppercase tracking-widest">
                <span>Часы: <span id="total_h" class="text-slate-800">0</span></span>
                <span>К выплате</span>
            </div>
            <div id="total_m" class="text-5xl font-black text-blue-600 tracking-tighter text-right leading-none">0.00 €</div>
        </div>
    </div>

    <script>
        const weekdays = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
        const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
        const ltHolidays = ['01-01','02-16','03-11','05-01','06-24','07-06','08-15','11-01','11-02','12-24','12-25','12-26'];

        function getEaster(year) {
            const f = Math.floor, G = year % 19, C = f(year / 100),
                H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30,
                I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11)),
                J = (year + f(year / 4) + I + 2 - C + f(C / 4)) % 7,
                L = I - J, month = 3 + f((L + 40) / 44), day = L + 28 - 31 * f(month / 4);
            return { month: month - 1, day: day };
        }

        let currentYear, currentMonth;

        function isHoliday(date) {
            const m = (date.getMonth() + 1).toString().padStart(2, '0');
            const d = date.getDate().toString().padStart(2, '0');
            if (ltHolidays.includes(`${m}-${d}`)) return true;
            if (date.getDay() === 0 || date.getDay() === 6) return true;
            const easter = getEaster(date.getFullYear());
            const eDate = new Date(date.getFullYear(), easter.month, easter.day);
            const eMon = new Date(date.getFullYear(), easter.month, easter.day + 1);
            if (date.toDateString() === eDate.toDateString() || date.toDateString() === eMon.toDateString()) return true;
            return false;
        }

        function generateTimeOptions(selected) {
            let options = '<option value="">--:--</option>';
            for (let h = 0; h < 24; h++) {
                for (let m = 0; m < 60; m += 30) {
                    const time = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                    options += `<option value="${time}" ${time === selected ? 'selected' : ''}>${time}</option>`;
                }
            }
            return options;
        }

        window.onload = function() {
            const now = new Date();
            initTable(now.getFullYear(), now.getMonth());
        };

        function changeDate(val) {
            if (!val) return;
            const [y, m] = val.split('-').map(Number);
            initTable(y, m - 1);
        }

        function initTable(year, month) {
            currentYear = year; currentMonth = month;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            document.getElementById('month-title').innerText = months[month].toUpperCase();
            document.getElementById('month-picker').value = `${year}-${(month + 1).toString().padStart(2, '0')}`;

            const storageKey = `worker_log_${year}_${month}`;
            const saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
            const settings = JSON.parse(localStorage.getItem('worker_settings') || '{"r_n":10, "r_o":15}');
            document.getElementById('r_n').value = settings.r_n;
            document.getElementById('r_o').value = settings.r_o;

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month, d);
                const holiday = isHoliday(date);
                const rowData = saved.rows ? saved.rows[d-1] : null;
                const tr = document.createElement('tr');
                if (holiday) tr.className = 'holiday';
                tr.innerHTML = `
                    <td class="font-bold text-xs">${d}<br><span class="opacity-40 font-normal">${weekdays[date.getDay()]}</span></td>
                    <td><select class="time-select" oninput="calc()">${generateTimeOptions(rowData ? rowData.s : '')}</select></td>
                    <td><select class="time-select" oninput="calc()">${generateTimeOptions(rowData ? rowData.e : '')}</select></td>
                    <td><input type="number" value="${rowData ? rowData.l : 0}" class="w-10 text-center text-sm py-1" oninput="calc()"></td>
                    <td class="row-m font-black text-slate-300 text-xs tracking-tighter">0</td>
                `;
                tbody.appendChild(tr);
            }
            calc();
        }

        function calc() {
            let tH = 0, tM = 0;
            const rn = parseFloat(document.getElementById('r_n').value) || 0;
            const ro = parseFloat(document.getElementById('r_o').value) || 0;
            const rows = [];
            document.querySelectorAll('#table-body tr').forEach(tr => {
                const selects = tr.querySelectorAll('select'), numI = tr.querySelector('input[type="number"]');
                const s = selects[0].value, e = selects[1].value, l = parseFloat(numI.value) || 0;
                rows.push({s, e, l});
                const rowM = tr.querySelector('.row-m');
                if (s && e) {
                    const [sh, sm] = s.split(':').map(Number), [eh, em] = e.split(':').map(Number);
                    let diff = (eh + em/60) - (sh + sm/60);
                    if (diff < 0) diff += 24;
                    let net = Math.max(0, diff - l/60);
                    let m = net > 8 ? (8 * rn + (net - 8) * ro) : (net * rn);
                    rowM.innerText = Math.round(m);
                    rowM.className = "row-m font-black text-blue-600 text-sm";
                    tH += net; tM += m;
                } else {
                    rowM.innerText = "0";
                    rowM.className = "row-m font-black text-slate-200 text-xs";
                }
            });
            document.getElementById('total_h').innerText = tH.toFixed(1);
            document.getElementById('total_m').innerText = tM.toFixed(2).replace('.', ',') + ' €';
            localStorage.setItem(`worker_log_${currentYear}_${currentMonth}`, JSON.stringify({rows}));
            localStorage.setItem('worker_settings', JSON.stringify({r_n: rn, r_o: ro}));
        }
    </script>
</body>
</html>
