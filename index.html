<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Table Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        table { border-spacing: 0; width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        th { background: #1e293b; color: white; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
        input { width: 100%; border: none; outline: none; background: transparent; font-weight: 600; text-align: center; font-size: 14px; }
        input[type="date"], input[type="time"] { cursor: pointer; }
        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .btn-add { background: #2563eb; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 800; transition: all 0.2s; }
        .btn-add:active { transform: scale(0.98); background: #1d4ed8; }
        .btn-clear { background: #ef4444; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 800; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">WORKER TABLE <span class="text-blue-600">PRO</span></h1>
                <p class="text-slate-500 text-sm">Данные сохраняются автоматически в памяти твоего телефона</p>
            </div>
            
            <div class="flex gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">Норма €/ч</label>
                    <input type="number" id="rate_n" value="10" class="text-left !w-16 text-blue-600 text-lg" oninput="saveAndCalc()">
                </div>
                <div class="border-l pl-4">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">Сверх €/ч</label>
                    <input type="number" id="rate_o" value="15" class="text-left !w-16 text-orange-600 text-lg" oninput="saveAndCalc()">
                </div>
            </div>
        </header>

        <div class="table-container bg-white">
            <table>
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Начало</th>
                        <th>Конец</th>
                        <th>Обед (мин)</th>
                        <th>Часы (нетто)</th>
                        <th>Сумма (€)</th>
                        <th>Действие</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="flex flex-wrap gap-4 mt-6">
            <button onclick="addRow()" class="btn-add flex-1 md:flex-none uppercase text-sm tracking-widest">
                + Добавить рабочий день
            </button>
            <button onclick="clearData()" class="btn-clear flex-1 md:flex-none uppercase text-sm tracking-widest opacity-50 hover:opacity-100 transition-opacity">
                Очистить всё
            </button>
        </div>

        <footer class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-800 rounded-3xl p-8 text-white flex justify-between items-center shadow-xl">
                <span class="text-slate-400 font-bold uppercase tracking-wider">Всего часов:</span>
                <span id="total_h" class="text-3xl font-black">0.00</span>
            </div>
            <div class="bg-blue-600 rounded-3xl p-8 text-white flex justify-between items-center shadow-xl">
                <span class="text-blue-100 font-bold uppercase tracking-wider italic">Итого к выплате:</span>
                <span id="total_m" class="text-4xl font-black text-yellow-300">0.00 €</span>
            </div>
        </footer>
    </div>

    <script>
        // Загрузка данных при старте
        window.onload = function() {
            const saved = localStorage.getItem('worker_data');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('rate_n').value = data.rate_n || 10;
                document.getElementById('rate_o').value = data.rate_o || 15;
                data.rows.forEach(rowData => addRow(rowData));
            } else {
                addRow();
            }
            saveAndCalc();
        };

        function addRow(data = null) {
            const tbody = document.getElementById('table-body');
            const row = document.createElement('tr');
            const today = new Date().toISOString().split('T')[0];
            
            row.innerHTML = `
                <td><input type="date" value="${data ? data.date : today}" oninput="saveAndCalc()"></td>
                <td><input type="time" value="${data ? data.start : '07:00'}" oninput="saveAndCalc()"></td>
                <td><input type="time" value="${data ? data.end : '16:00'}" oninput="saveAndCalc()"></td>
                <td><input type="number" value="${data ? data.lunch : 0}" oninput="saveAndCalc()"></td>
                <td class="font-bold text-slate-500" id="row-h">0.00</td>
                <td class="font-bold text-blue-600 bg-blue-50" id="row-m">0.00</td>
                <td><button onclick="this.parentElement.parentElement.remove(); saveAndCalc()" class="text-red-400 hover:text-red-600 font-bold">✖</button></td>
            `;
            tbody.appendChild(row);
            saveAndCalc();
        }

        function saveAndCalc() {
            let totalH = 0, totalM = 0;
            const rn = parseFloat(document.getElementById('rate_n').value) || 0;
            const ro = parseFloat(document.getElementById('rate_o').value) || 0;
            const rowsData = [];

            document.querySelectorAll('#table-body tr').forEach(tr => {
                const inputs = tr.querySelectorAll('input');
                const rowData = {
                    date: inputs[0].value,
                    start: inputs[1].value,
                    end: inputs[2].value,
                    lunch: parseFloat(inputs[3].value) || 0
                };
                rowsData.push(rowData);

                if(rowData.start && rowData.end) {
                    let diff = (new Date('2000-01-01T'+rowData.end) - new Date('2000-01-01T'+rowData.start))/3600000;
                    if(diff < 0) diff += 24;
                    let net = Math.max(0, diff - rowData.lunch/60);
                    let money = net > 8 ? (8 * rn + (net - 8) * ro) : (net * rn);
                    
                    tr.querySelector('#row-h').innerText = net.toFixed(2);
                    tr.querySelector('#row-m').innerText = money.toFixed(2);
                    
                    totalH += net;
                    totalM += money;
                }
            });

            document.getElementById('total_h').innerText = totalH.toFixed(2);
            document.getElementById('total_m').innerText = totalM.toFixed(2).replace('.', ',') + ' €';

            // Сохраняем в LocalStorage
            localStorage.setItem('worker_data', JSON.stringify({
                rate_n: rn,
                rate_o: ro,
                rows: rowsData
            }));
        }

        function clearData() {
            if(confirm('Точно очистить все данные?')) {
                localStorage.removeItem('worker_data');
                document.getElementById('table-body').innerHTML = '';
                addRow();
            }
        }
    </script>
</body>
</html>
